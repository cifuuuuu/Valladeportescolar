const noticiasGrid = document.getElementById('noticiasGrid');
let expandedId = null;

function renderNoticias() {
  noticiasGrid.innerHTML = '';

  noticias.forEach(noticia => {
    const isExpanded = expandedId === noticia.id;
    const card = document.createElement('div');
    card.className = `noticia-card ${isExpanded ? 'expanded' : ''}`;

    if (isExpanded) {
      card.innerHTML = `
        <div class="noticia-body">
          <div class="noticia-expanded-header">
            <div class="noticia-expanded-img-main">📸</div>
            <div class="noticia-expanded-info">
              <span class="noticia-sport">${noticia.sport}</span>
              <h2 class="noticia-expanded-title">${noticia.title}</h2>
              <div class="noticia-expanded-meta">
                <div class="noticia-expanded-meta-item">
                  <span class="noticia-expanded-meta-label">Publicado:</span>
                  <span>${noticia.date}</span>
                </div>
              </div>
            </div>
          </div>

          <div class="noticia-expanded-content">
            ${noticia.content.split('\n\n').map(p => `<p>${p.trim()}</p>`).join('')}
            <div class="noticia-expanded-img-body">📸</div>
          </div>

          <button class="noticia-close" onclick="cerrarNoticia()">← Cerrar noticia</button>
        </div>
      `;
    } else {
      card.innerHTML = `
        <div class="noticia-img-header">📸</div>
        <div class="noticia-body">
          <span class="noticia-sport">${noticia.sport}</span>
          <h3 class="noticia-title">${noticia.title}</h3>
          <p class="noticia-summary">${noticia.summary}</p>
          <div class="noticia-meta">
            <span class="date">${noticia.date}</span>
            <span class="noticia-expand">Leer más →</span>
          </div>
        </div>
      `;
    }

    card.addEventListener('click', () => {
      if (!isExpanded) {
        expandedId = noticia.id;
        renderNoticias();
        card.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });

    noticiasGrid.appendChild(card);
  });
}

function cerrarNoticia() {
  expandedId = null;
  renderNoticias();
}

// Mostrar fecha actual
document.getElementById('fecha').textContent = new Date().toLocaleDateString('es-ES', {
  weekday: 'long',
  year: 'numeric',
  month: 'long',
  day: 'numeric'
});

renderNoticias();
</script>
